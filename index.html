<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bolt-like App</title>
    <style>
        /* Basic reset */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }

        body {
            background-color: #f0f2f5;
            color: #333;
            padding: 20px;
        }

        header {
            background-color: #4f46e5;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card h3 {
            margin-bottom: 10px;
            color: #4f46e5;
        }

        .card p {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <header>
        <h1>My Bolt-like App</h1>
    </header>

    <div class="card-container">
        <div class="card">
            <h3>Card 1</h3>
            <p>Konten mirip layout Bolt.</p>
        </div>
        <div class="card">
            <h3>Card 2</h3>
            <p>Konten mirip layout Bolt.</p>
        </div>
        <div class="card">
            <h3>Card 3</h3>
            <p>Konten mirip layout Bolt.</p>
        </div>
    </div>
</body>
</html>
